<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SGPP UPEL — Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0d1b2a;
      --navy2:   #142033;
      --gold:    #c9973a;
      --gold2:   #e8b85a;
      --cream:   #f5f0e8;
      --text:    #e8e4dc;
      --muted:   #8a97a8;
      --border:  rgba(201,151,58,.25);
      --glass:   rgba(20, 32, 51, .72);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ─── Fondo animado ─── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201,151,58,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(13,27,42,.9) 0%, transparent 70%),
        linear-gradient(160deg, #0d1b2a 0%, #142033 50%, #0a1520 100%);
    }

    .bg::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(0deg,   transparent, transparent 59px, rgba(201,151,58,.04) 60px),
        repeating-linear-gradient(90deg,  transparent, transparent 59px, rgba(201,151,58,.04) 60px);
    }

    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(201,151,58,.18) 0%, transparent 70%);
      top: -120px; left: -100px;
      animation: drift1 14s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(20,80,140,.25) 0%, transparent 70%);
      bottom: -80px; right: -80px;
      animation: drift2 18s ease-in-out infinite alternate;
    }

    @keyframes drift1 { to { transform: translate(60px, 80px); } }
    @keyframes drift2 { to { transform: translate(-50px, -60px); } }

    /* ─── Card ─── */
    .card {
      position: relative; z-index: 10;
      width: 420px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 52px 48px 44px;
      backdrop-filter: blur(24px);
      box-shadow:
        0 32px 80px rgba(0,0,0,.55),
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 1px 0   rgba(255,255,255,.08) inset;
      animation: slideUp .7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Línea dorada superior ─── */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 48px; right: 48px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 0 0 4px 4px;
    }

    /* ─── Logo / escudo placeholder ─── */
    .logo-wrap {
      display: flex; justify-content: center; margin-bottom: 28px;
    }
    .logo-circle {
      width: 68px; height: 68px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold) 0%, #8a5f1e 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 6px rgba(201,151,58,.12), 0 8px 24px rgba(0,0,0,.4);
      font-size: 28px;
    }

    /* ─── Encabezado ─── */
    .headline {
      text-align: center; margin-bottom: 8px;
    }
    .headline h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem; font-weight: 700;
      color: var(--gold2);
      letter-spacing: .5px;
      line-height: 1.2;
    }
    .headline p {
      font-size: .78rem; font-weight: 300;
      color: var(--muted); letter-spacing: 2.5px;
      text-transform: uppercase; margin-top: 6px;
    }

    .divider {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 18px auto 32px;
    }

    /* ─── Formulario ─── */
    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: .73rem; font-weight: 500;
      color: var(--muted); letter-spacing: 1.8px;
      text-transform: uppercase; margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 15px; pointer-events: none;
      transition: color .25s;
    }

    input {
      width: 100%; padding: 13px 16px 13px 44px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .95rem;
      outline: none;
      transition: border-color .25s, background .25s, box-shadow .25s;
    }
    input::placeholder { color: rgba(138,151,168,.5); }
    input:focus {
      border-color: var(--gold);
      background: rgba(201,151,58,.06);
      box-shadow: 0 0 0 3px rgba(201,151,58,.12);
    }
    input:focus + .input-icon,
    .input-wrap:focus-within .input-icon { color: var(--gold); }

    /* ─── Recordar / olvidé ─── */
    .row-aux {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px; margin-top: -4px;
    }
    .remember {
      display: flex; align-items: center; gap: 8px;
      font-size: .8rem; color: var(--muted); cursor: pointer;
    }
    .remember input[type=checkbox] {
      width: 15px; height: 15px; padding: 0;
      accent-color: var(--gold);
    }
    .forgot {
      font-size: .8rem; color: var(--gold);
      text-decoration: none; opacity: .85;
      transition: opacity .2s;
    }
    .forgot:hover { opacity: 1; text-decoration: underline; }

    /* ─── Botón ─── */
    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--gold) 0%, #a07020 100%);
      border: none; border-radius: 10px;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: .95rem; font-weight: 500;
      letter-spacing: .8px; cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform .15s, box-shadow .25s;
      box-shadow: 0 4px 20px rgba(201,151,58,.35);
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(201,151,58,.45); }
    .btn:active { transform: translateY(0);    box-shadow: 0 2px 10px rgba(201,151,58,.3); }

    /* ─── Pie ─── */
    .footer {
      text-align: center; margin-top: 32px;
      font-size: .72rem; color: rgba(138,151,168,.5);
      letter-spacing: .5px;
    }
    .footer span { color: var(--gold); opacity: .7; }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">

    <div class="logo-wrap">
      <div class="logo-circle">🎓</div>
    </div>

    <div class="headline">
      <h1>SGPP UPEL</h1>
      <p>Sistema de Gestión de Pagos de Postgrado</p>
    </div>

    <div class="divider"></div>

    <!-- Usuario -->
    <div class="form-group">
      <label for="usuario">Usuario</label>
      <div class="input-wrap">
        <input id="usuario" type="text" placeholder="Ingresa tu usuario" autocomplete="username"/>
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
    </div>

    <!-- Contraseña -->
    <div class="form-group">
      <label for="password">Contraseña</label>
      <div class="input-wrap">
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
    </div>

    <div class="row-aux">
      <label class="remember">
        <input type="checkbox"/> Recordarme
      </label>
      <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
    </div>

    <button class="btn" type="button">Iniciar sesión</button>

    <div class="footer">
      Universidad Pedagógica Experimental Libertador &nbsp;·&nbsp; <span>UPEL</span>
    </div>

  </div>

</body>
</html>
